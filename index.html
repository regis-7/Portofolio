<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regis Niyokwizerwa — IT Portfolio</title>
  <meta name="description" content="Portfolio of Regis Niyokwizerwa — IT Professional & Software Developer based in Kigali, Rwanda.">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- Navigation Component -->
<div id="nav-component"></div>

<!-- Hero Component -->
<div id="hero-component"></div>

<!-- About Component -->
<div id="about-component"></div>

<!-- Skills Component -->
<div id="skills-component"></div>

<!-- Experience Component -->
<div id="experience-component"></div>

<!-- Projects Component -->
<div id="projects-component"></div>

<!-- Blog Component -->
<div id="blog-component"></div>

<!-- Testimonials Component -->
<div id="testimonials-component"></div>

<!-- Contact Component -->
<div id="contact-component"></div>

<!-- Footer Component -->
<div id="footer-component"></div>

<!-- Scripts -->
<script src="js/script.js"></script>
<script>
// Component Loader
async function loadComponent(componentId, componentPath) {
  try {
    const response = await fetch(componentPath);
    const html = await response.text();
    document.getElementById(componentId).innerHTML = html;
  } catch (error) {
    console.error(`Error loading component ${componentId}:`, error);
  }
}

// Load all components
async function loadAllComponents() {
  const components = [
    { id: 'nav-component', path: 'components/nav.html' },
    { id: 'hero-component', path: 'components/hero.html' },
    { id: 'about-component', path: 'components/about.html' },
    { id: 'skills-component', path: 'components/skills.html' },
    { id: 'experience-component', path: 'components/experience.html' },
    { id: 'projects-component', path: 'components/projects.html' },
    { id: 'blog-component', path: 'components/blog.html' },
    { id: 'testimonials-component', path: 'components/testimonials.html' },
    { id: 'contact-component', path: 'components/contact.html' },
    { id: 'footer-component', path: 'components/footer.html' }
  ];

  // Load components in parallel
  await Promise.all(components.map(comp => loadComponent(comp.id, comp.path)));

  // Initialize animations after components are loaded
  initializeAnimations();
}

// Initialize scroll animations
function initializeAnimations() {
  const observerOptions = {
    threshold: 0.1,
    rootMargin: '0px 0px -50px 0px'
  };

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, observerOptions);

  // Observe all elements with fade-up class
  document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
}

// Load components when DOM is ready
document.addEventListener('DOMContentLoaded', loadAllComponents);
</script>

</body>
</html>
